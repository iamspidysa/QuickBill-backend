spring.datasource.url = jdbc:mysql://localhost:3306/quickbill
spring.datasource.username =${DB_USERNAME}
spring.datasource.password =${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto = update
server.servlet.context-path = /api/v1.0

aws.access.key=${ACCESS_KEY}
aws.secret.key=${SECRET_KEY}
aws.region=${REGION}
aws.bucket.name=${BUCKET_NAME}

jwt.secret.key=${JWT_SECRET_KEY}

razorpay.key.id = ${RAZORPAY_ID}
razorpay.key.secret = ${RAZORPAY_SECRET}

app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}